<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="เข้าสู่ระบบ ROOC Market TH" />
    <title>เข้าสู่ระบบ | ROOC Market TH</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="shell nav">
        <a class="brand" href="index.html" aria-label="ROOC Market TH">
          <span class="brand-mark">RO</span>
          <span>
            <strong>ROOC Market</strong>
            <small>Thailand Marketplace</small>
          </span>
        </a>

        <div class="nav-links" aria-label="เมนูหลัก">
          <a href="index.html#market">ตลาด</a>
          <a href="index.html#categories">หมวดหมู่</a>
          <a href="post.html">ลงประกาศ</a>
          <a href="post.html#safe">ความปลอดภัย</a>
        </div>

        <div class="nav-actions">
          <label class="theme-switch" aria-label="สลับโหมดสว่างและมืด">
            <input id="themeToggle" type="checkbox" />
            <span class="switch-track">
              <span class="switch-ball"></span>
            </span>
          </label>
          <a class="btn btn-primary" href="post.html">ลงประกาศ</a>
        </div>
      </nav>
    </header>

    <main class="shell auth-page">
      <section class="auth-card">
        <div class="auth-copy">
          <p class="eyebrow">ROOC Market TH</p>
          <h1>เข้าสู่ระบบ</h1>
          <p>ต้องเข้าสู่ระบบก่อนลงประกาศ เพื่อให้ประกาศผูกกับบัญชีผู้ขายและตรวจสอบย้อนหลังได้</p>
        </div>

        <form class="auth-form" id="authForm">
          <button class="btn btn-primary discord-login" id="authSubmit" type="submit">
            เข้าสู่ระบบด้วย Discord
          </button>
          <p class="admin-message" id="authMessage"></p>
        </form>

        <div class="auth-session" id="authSession" hidden>
          <strong id="authUserEmail"></strong>
          <span>คุณเข้าสู่ระบบแล้ว</span>
          <div class="post-actions">
            <a class="btn btn-primary" href="post.html">ไปลงประกาศ</a>
            <a class="btn btn-primary admin-link" href="admin.html" hidden>Admin</a>
            <button class="btn btn-light" id="authLogout" type="button">ออกจากระบบ</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const config = window.ROOC_SUPABASE || {};
      const canUseSupabase = Boolean(config.url && config.anonKey && window.supabase);
      const supabaseClient = canUseSupabase ? window.supabase.createClient(config.url, config.anonKey) : null;
      const authForm = document.querySelector("#authForm");
      const authMessage = document.querySelector("#authMessage");
      const authSession = document.querySelector("#authSession");
      const authUserEmail = document.querySelector("#authUserEmail");
      const authLogout = document.querySelector("#authLogout");
      const adminLink = document.querySelector(".admin-link");

      function setAuthMessage(message, isError = false) {
        authMessage.textContent = message;
        authMessage.classList.toggle("is-error", isError);
      }

      function showSession(session) {
        const loggedIn = Boolean(session);
        authForm.hidden = loggedIn;
        authSession.hidden = !loggedIn;
        if (session) authUserEmail.textContent = getDiscordDisplayName(session);
        if (adminLink) adminLink.hidden = !isAdminSession(session);
      }

      function getDiscordDisplayName(session) {
        const user = session?.user || {};
        const identityData = user.identities?.find((identity) => identity.provider === "discord")?.identity_data || {};
        return user.user_metadata?.full_name ||
          user.user_metadata?.name ||
          user.user_metadata?.preferred_username ||
          identityData.full_name ||
          identityData.name ||
          identityData.preferred_username ||
          user.email ||
          "ผู้ใช้งาน Discord";
      }

      function getSessionEmail(session) {
        const user = session?.user || {};
        return (user.email || user.user_metadata?.email || user.identities?.[0]?.identity_data?.email || "").toLowerCase();
      }

      function isAdminSession(session) {
        if (!session) return false;
        const user = session.user || {};
        const email = getSessionEmail(session);
        const identities = user.identities || [];
        const discordIds = identities
          .filter((identity) => identity.provider === "discord")
          .map((identity) => identity.identity_data?.sub || identity.id)
          .filter(Boolean);
        return (config.adminUserIds || []).includes(user.id) ||
          (config.adminEmails || []).map((entry) => entry.toLowerCase()).includes(email) ||
          discordIds.some((id) => (config.adminDiscordIds || []).includes(id));
      }

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!canUseSupabase) {
          setAuthMessage("ยังไม่ได้ตั้งค่า Supabase", true);
          return;
        }

        setAuthMessage("กำลังพาไป Discord...");
        const redirect = new URLSearchParams(location.search).get("redirect") || "post.html";
        const redirectTo = new URL(redirect, location.href).href;
        const result = await supabaseClient.auth.signInWithOAuth({
          provider: "discord",
          options: {
            redirectTo
          }
        });

        if (result.error) {
          setAuthMessage(result.error.message, true);
          return;
        }
      });

      authLogout.addEventListener("click", async () => {
        await supabaseClient.auth.signOut();
        location.reload();
      });

      if (canUseSupabase) {
        supabaseClient.auth.getSession().then(({ data }) => showSession(data.session));
        supabaseClient.auth.onAuthStateChange((_event, session) => showSession(session));
      } else {
        setAuthMessage("ยังไม่ได้ตั้งค่า Supabase", true);
      }

      const themeToggle = document.querySelector("#themeToggle");
      const savedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const activeTheme = savedTheme || (prefersDark ? "dark" : "light");

      document.documentElement.dataset.theme = activeTheme;
      themeToggle.checked = activeTheme === "dark";

      themeToggle.addEventListener("change", () => {
        const nextTheme = themeToggle.checked ? "dark" : "light";
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem("theme", nextTheme);
      });
    </script>
  </body>
</html>
